name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: macos-latest
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            python3-tk \
            libportaudio2 \
            portaudio19-dev

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        run: pyinstaller WordScript.spec --distpath dist-python --noconfirm

      - name: Copy sidecar to Tauri binaries (Linux / macOS)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          TRIPLE=$(rustc -vV 2>/dev/null | awk '/^host:/{print $2}')
          OS="$(uname -s)"
          case "$OS" in
            Linux)  SRC="dist-python/WordScript-linux" ;;
            Darwin) SRC="dist-python/WordScript-macos" ;;
          esac
          mkdir -p src-tauri/binaries
          cp -f "$SRC" "src-tauri/binaries/wordscript-sidecar-$TRIPLE"
          chmod +x "src-tauri/binaries/wordscript-sidecar-$TRIPLE"

      - name: Copy sidecar to Tauri binaries (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $triple = rustc -vV 2>$null | Select-String "host:" | ForEach-Object { ($_ -replace "host:\s*","").Trim() }
          New-Item -ItemType Directory -Force -Path "src-tauri\binaries" | Out-Null
          Copy-Item -Force "dist-python\WordScript-windows.exe" "src-tauri\binaries\wordscript-sidecar-$triple.exe"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Determine pre-release flag
        id: prerelease
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -qiE '(alpha|beta|rc)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WordScript ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
